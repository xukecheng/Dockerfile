name: Build openclaw-browser Image

on:
  push:
    paths:
      - "openclaw-browser/**"
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: openclaw-browser

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./openclaw-browser
          file: ./openclaw-browser/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/openclaw-browser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
